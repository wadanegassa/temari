name: temari
description: "Temari — AI study companion for Ethiopian students."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend
  supabase_flutter: ^2.8.4

  # AI / Network
  http: ^1.2.2

  # Voice / audio UI
  speech_to_text: ^7.0.0
  flutter_sound: ^9.16.3
  audio_waveforms: ^1.1.1

  # Files
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  pdfx: ^2.8.0
  open_filex: ^4.5.0

  # UI / Nav
  google_fonts: ^6.2.1
  go_router: ^14.6.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  path: ^1.9.0
  collection: ^1.19.0
  flutter_dotenv: ^5.2.1
  flutter_markdown: ^0.7.7+1
  audioplayers: ^6.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/temari.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/dotenv
